# ===========================================================
# SecureBoot Project — GitHub Actions CI/CD
# Dev: x0rkr | github.com/x0rkr
# Automatically builds boot.bin on every push
# ===========================================================

name: Build SecureBoot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install toolchain
        run: |
          sudo apt update
          sudo apt install -y nasm gcc make binutils

      - name: Build boot image
        run: make

      - name: Verify boot image
        run: |
          ls -lh build/boot.bin
          echo "[+] Boot image built successfully"

      - name: Upload boot image artifact
        uses: actions/upload-artifact@v3
        with:
          name: boot-image
          path: build/boot.bin

