name: Build SecureBoot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt update
          sudo apt install -y nasm gcc make binutils

      - name: Create build directory
        run: mkdir -p build

      - name: Build boot image
        run: make

      - name: Verify boot image
        run: |
          ls -lh build/boot.bin
          echo "[+] Boot image built successfully"

      - name: Upload boot image artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-image-v4
          path: build/boot.bin
